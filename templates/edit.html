<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">
    <h2>Edit Expense</h2>

    <form method="POST">
        <input type="text" name="title" value="{{ expense.title }}" required>

        <input type="number" name="amount" value="{{ expense.amount }}" required>
        <input type="date" name="date" value="{{ expense.date }}" required>
        <select name="category_id" required>
            {% for c in categories %}
                <option value="{{ c.id }}"
                    {% if c.id == expense.category_id %} selected {% endif %}>
                    {{ c.name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Update</button>
    </form>

    <a href="{{ url_for('dashboard') }}">Cancel</a>
</div>

</body>
</html>
